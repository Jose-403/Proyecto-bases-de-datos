{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<section class="card">
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Accede con tu correo y contraseña</p>

    <form method="POST" action="{{ url_for('login') }}" class="form">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="manuel.rodriguez@gmail.com" required autofocus>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>

        <button type="submit" class="btn btn-primary">Entrar</button>
    </form>

    <p class="footer-link">
        ¿No tienes cuenta? <a href="{{ url_for('register') }}">Regístrate aquí</a>
    </p>

    <div class="hint">
        <strong>Usuario de prueba (director de agencia):</strong><br>
        manuel.rodriguez@gmail.com / Dir2025AG001
    </div>
</section>
{% endblock %}
