{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}
<section class="card">
    <h1>Crear cuenta</h1>
    <p class="subtitle">Regístrate para acceder al sistema</p>

    <form method="POST" action="{{ url_for('register') }}" class="form">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="tu_usuario" required autofocus>

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="tu@correo.com" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>

        <label for="confirm_password">Confirmar contraseña</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repite la contraseña" required>

        <button type="submit" class="btn btn-primary">Registrarse</button>
    </form>

    <p class="footer-link">
        ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a>
    </p>
</section>
{% endblock %}
